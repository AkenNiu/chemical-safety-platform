<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>危险化学品企业生产安全智能管控平台（SMAP平台）</title>
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<style>
/* 页面特有样式 */
.app-container { display: flex; height: 100vh; }

/* ==================== 顶部状态栏 ==================== */
.topbar {
  position: relative; z-index: 100;
  height: var(--topbar-h);
  background: linear-gradient(180deg, #0a1a32 0%, #081424 100%);
  border-bottom: 1px solid var(--border-medium);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.5);
}
.topbar::after {
  content: "";
  position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--primary), transparent);
  opacity: 0.5;
}
.topbar-left { display: flex; align-items: center; gap: 16px; }
.topbar-logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  box-shadow: 0 0 14px var(--primary-glow);
}
.logo-text { display: flex; flex-direction: column; }
.logo-title { font-size: 15px; font-weight: 700; color: var(--text-primary); letter-spacing: 0.5px; }
.logo-sub { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; }

.topbar-center {
  display: flex; align-items: center; gap: 20px;
  flex: 1; justify-content: center;
}
.tbc-item {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  position: relative;
}
.tbc-item:not(:last-child)::after {
  content: "";
  position: absolute; right: -10px; top: 50%; transform: translateY(-50%);
  width: 1px; height: 28px;
  background: linear-gradient(180deg, transparent, var(--border-medium), transparent);
}
.tbc-label { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
.tbc-value { font-size: 13px; font-weight: 600; color: var(--text-secondary); white-space: nowrap; }
.tbc-value.days { font-size: 20px; font-weight: 800; color: var(--status-green); }
.tbc-value.highlight { color: var(--primary-light); text-shadow: 0 0 8px rgba(22,119,255,0.3); }

.alert-ticker {
  display: flex; align-items: center; gap: 8px;
  background: rgba(245,34,45,0.08);
  border: 1px solid rgba(245,34,45,0.2);
  border-radius: 20px;
  padding: 4px 14px;
  max-width: 380px;
  overflow: hidden;
}
.alert-ticker-icon {
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--status-red);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: #fff;
  animation: pulseRed 1.2s infinite;
  flex-shrink: 0;
}
.alert-ticker-text {
  font-size: 12px; color: var(--status-red);
  white-space: nowrap;
  animation: tickerScroll 12s linear infinite;
}
@keyframes tickerScroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
@keyframes pulseRed { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

.warning-lights { display: flex; align-items: center; gap: 6px; }
.wlight { width: 10px; height: 10px; border-radius: 50%; position: relative; }
.wlight::after { content: ""; position: absolute; inset: -3px; border-radius: 50%; border: 1px solid currentColor; opacity: 0; }
.wlight.red { background: var(--status-red); color: var(--status-red); box-shadow: 0 0 8px var(--status-red); animation: blinkRed 0.8s infinite; }
.wlight.orange { background: var(--status-orange); color: var(--status-orange); box-shadow: 0 0 6px var(--status-orange); animation: blinkOrange 1.5s infinite; }
.wlight.yellow { background: var(--status-yellow); color: var(--status-yellow); box-shadow: 0 0 4px var(--status-yellow); }
.wlight.blue { background: var(--status-blue); color: var(--status-blue); box-shadow: 0 0 4px var(--status-blue); }
@keyframes blinkRed { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
@keyframes blinkOrange { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

.topbar-right { display: flex; align-items: center; gap: 14px; }
.weather-box { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
.weather-temp { font-weight: 600; color: var(--text-primary); }
.user-box { display: flex; align-items: center; gap: 8px; cursor: pointer; }
.user-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--primary-light)); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: #fff; border: 2px solid rgba(22,119,255,0.3); }
.user-name { font-size: 12px; color: var(--text-secondary); }
.user-role { font-size: 10px; color: var(--text-muted); }

/* 左侧菜单 */
.sidebar-l1 {
  width: var(--sidebar-l1); flex-shrink: 0;
  background: linear-gradient(180deg, #0a1a32, #081424);
  border-right: 1px solid var(--border-subtle);
  display: flex; flex-direction: column; align-items: center;
  padding: 8px 0; gap: 4px;
}
.l1-item {
  width: 48px; height: 48px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; border-radius: var(--radius-md);
  color: var(--text-muted); cursor: pointer; transition: all .2s;
  position: relative;
}
.l1-item .l1-icon { font-size: 20px; transition: transform .2s; }
.l1-item .l1-label { font-size: 10px; transform: scale(0.85); white-space: nowrap; }
.l1-item:hover { color: var(--text-secondary); background: rgba(22,119,255,0.06); }
.l1-item.active { color: #fff; background: rgba(22,119,255,0.18); box-shadow: 0 0 14px rgba(22,119,255,0.2); }
.l1-item.active::before { content: ""; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 24px; background: var(--primary); border-radius: 0 2px 2px 0; }
.l1-item.active .l1-icon { transform: scale(1.1); }

.content-area { flex: 1; overflow: hidden; position: relative; }
.content-area iframe { width: 100%; height: 100%; border: none; }
</style>
</head>
<body>
<!-- 顶部状态栏 -->
<header class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">
      <div class="logo-icon">&#9874;</div>
      <div class="logo-text">
        <div class="logo-title">危险化学品企业生产安全智能管控平台</div>
        <div class="logo-sub">SMAP PLATFORM</div>
      </div>
    </div>
  </div>

  <div class="topbar-center">
    <div class="tbc-item">
      <div class="tbc-label">当前时间</div>
      <div class="tbc-value highlight" id="clock">--</div>
    </div>
    <div class="tbc-item">
      <div class="tbc-label">安全生产天数</div>
      <div class="tbc-value days">1,268</div>
    </div>
    <div class="tbc-item">
      <div class="tbc-label">当前班次</div>
      <div class="tbc-value">白班 08:00-20:00</div>
    </div>
    <div class="tbc-item">
      <div class="tbc-label">值班领导</div>
      <div class="tbc-value">张总监</div>
    </div>
    <div class="tbc-item">
      <div class="tbc-label">值班人员</div>
      <div class="tbc-value">李工程师 / 王班长</div>
    </div>
    <div class="tbc-item">
      <div class="tbc-label">全厂状态</div>
      <div class="warning-lights">
        <div class="wlight red" title="危险"></div>
        <div class="wlight orange" title="预警"></div>
        <div class="wlight yellow" title="注意"></div>
        <div class="wlight blue" title="正常"></div>
      </div>
    </div>
    <div class="alert-ticker">
      <div class="alert-ticker-icon">&#9888;</div>
      <div class="alert-ticker-text">
        液氨储罐A1压力超高报警 | 乙烯裂解炉F-101温度持续超限 | 公用工程循环水温度异常 |
        液氨储罐A1压力超高报警 | 乙烯裂解炉F-101温度持续超限 | 公用工程循环水温度异常 |
      </div>
    </div>
  </div>

  <div class="topbar-right">
      <div class="weather-box">
      <span style="font-size:14px;">&#9729;</span>
      <span>多云</span>
      <span class="weather-temp">22°C</span>
    </div>
    <div class="user-box">
      <div style="text-align:right;">
        <div class="user-name">管理员</div>
        <div class="user-role">安全总监</div>
      </div>
      <div class="user-avatar">管</div>
    </div>
  </div>
</header>

<!-- 主容器 -->
<div class="main-container">
  <!-- 左侧一级菜单 -->
  <aside class="sidebar-l1" id="sidebarL1">
    <div class="l1-item active" data-page="dashboard" title="数据大屏">
      <span class="l1-icon">&#128200;</span>
      <span class="l1-label">数据大屏</span>
    </div>
    <div class="l1-item" data-page="workspace" title="工作平台">
      <span class="l1-icon">&#128187;</span>
      <span class="l1-label">工作平台</span>
    </div>
    <div class="l1-item" data-page="ai-staff" title="数字员工">
      <span class="l1-icon">&#129302;</span>
      <span class="l1-label">数字员工</span>
    </div>
    <div class="l1-item" data-page="builder" title="能力平台">
      <span class="l1-icon">&#128295;</span>
      <span class="l1-label">能力平台</span>
    </div>
    <div class="l1-item" data-page="knowledge" title="知识库">
      <span class="l1-icon">&#128218;</span>
      <span class="l1-label">知识库</span>
    </div>
    <div class="l1-item" data-page="experts" title="专家智库">
      <span class="l1-icon">&#127891;</span>
      <span class="l1-label">专家智库</span>
    </div>
    <div class="l1-item" data-page="connector" title="连接器">
      <span class="l1-icon">&#128279;</span>
      <span class="l1-label">连接器</span>
    </div>
    <div class="l1-item" data-page="news" title="安全资讯">
      <span class="l1-icon">&#128240;</span>
      <span class="l1-label">安全资讯</span>
    </div>
    <div class="l1-item" data-page="settings" title="设置">
      <span class="l1-icon">&#9881;</span>
      <span class="l1-label">设置</span>
    </div>
  </aside>

  <!-- 内容区域：iframe嵌入二级页面 -->
  <main class="content-area">
    <iframe id="pageFrame" src="pages/dashboard.html" style="width:100%;height:100%;border:none;"></iframe>
  </main>
</div>

<script>
// 一级菜单切换逻辑
document.querySelectorAll('.l1-item').forEach(item => {
  item.addEventListener('click', function() {
    const page = this.dataset.page;
    document.querySelectorAll('.l1-item').forEach(i => i.classList.remove('active'));
    this.classList.add('active');
    document.getElementById('pageFrame').src = 'pages/' + page + '.html';
  });
});

// 时钟
function updateClock() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,"0");
  const d = String(now.getDate()).padStart(2,"0");
  const h = String(now.getHours()).padStart(2,"0");
  const min = String(now.getMinutes()).padStart(2,"0");
  const s = String(now.getSeconds()).padStart(2,"0");
  const wk = ["日","一","二","三","四","五","六"][now.getDay()];
  document.getElementById('clock').textContent = `${y}-${m}-${d} 星期${wk} ${h}:${min}:${s}`;
}
setInterval(updateClock, 1000);
updateClock();
</script>


<!-- 主题切换按钮 -->
<button id="themeToggle" onclick="toggleTheme()" style="
  position:fixed; top:12px; right:20px; z-index:9999;
  background:var(--bg-elevated); border:1px solid var(--border);
  color:var(--text-primary); padding:6px 14px;
  border-radius:var(--radius-md); cursor:pointer; font-size:13px;
  transition:all 0.2s;
">🌙 深色</button>
<script>
function toggleTheme(){
  const html=document.documentElement;
  const btn=document.getElementById('themeToggle');
  if(html.getAttribute('data-theme')==='light'){
    html.removeAttribute('data-theme');
    btn.innerHTML='🌙 深色';
    localStorage.setItem('theme','dark');
  }else{
    html.setAttribute('data-theme','light');
    btn.innerHTML='☀️ 浅色';
    localStorage.setItem('theme','light');
  }
}
(function(){
  if(localStorage.getItem('theme')==='light'){
    document.documentElement.setAttribute('data-theme','light');
    const btn=document.getElementById('themeToggle');
    if(btn) btn.innerHTML='☀️ 浅色';
  }
})();
</script>

</body>
</html>
