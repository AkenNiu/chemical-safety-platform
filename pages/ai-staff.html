<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数字员工 - SMAP平台</title>
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/l2-frame.css">
</head>
<body>
<div class="l2-container">
  <aside class="sidebar-l2" id="sidebarL2">
    <div class="l2-header">
      <span id="l2Title">数字员工</span>
      <span class="l2-toggle" id="l2Toggle" title="折叠">&#9664;</span>
    </div>
    <div class="l2-list" id="l2List"></div>
  </aside>
  <main class="l2-content">
    <iframe id="l2Frame" src="ai-staff/market.html"></iframe>
  </main>
</div>
<script>
const menuData = [
  { icon: "&#129302;", label: "智能体市场", page: "ai-staff/market.html" },
  { icon: "&#129302;", label: "报警诊断", page: "ai-staff/alarm-diag.html" },
  { icon: "&#129302;", label: "异常工况诊断", page: "ai-staff/abnormal-diag.html" },
  { icon: "&#129302;", label: "作业风险评估", page: "ai-staff/risk-assess.html" },
  { icon: "&#129302;", label: "设备故障预测", page: "ai-staff/fault-predict.html" },
  { icon: "&#129302;", label: "泄漏扩散模拟", page: "ai-staff/leak-sim.html" },
  { icon: "&#129302;", label: "应急辅助决策", page: "ai-staff/emergency-decision.html" },
  { icon: "&#128200;", label: "报告生成", page: "ai-staff/report-gen.html" }
];

let l2Collapsed = false;
const list = document.getElementById('l2List');
const frame = document.getElementById('l2Frame');

function renderMenu() {
  list.innerHTML = menuData.map((item, i) =>
    `<div class="l2-item ${i === 0 ? 'active' : ''}" data-index="${i}">
      <span class="l2-icon">${item.icon}</span>${item.label}
    </div>`
  ).join('');
  list.querySelectorAll('.l2-item').forEach(el => {
    el.addEventListener('click', () => {
      list.querySelectorAll('.l2-item').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
      frame.src = menuData[el.dataset.index].page;
    });
  });
}

document.getElementById('l2Toggle').addEventListener('click', () => {
  l2Collapsed = !l2Collapsed;
  document.getElementById('sidebarL2').classList.toggle('collapsed', l2Collapsed);
  document.getElementById('l2Toggle').innerHTML = l2Collapsed ? '&#9654;' : '&#9664;';
});

renderMenu();
</script>
</body>
</html>
