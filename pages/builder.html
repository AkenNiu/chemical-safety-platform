<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>能力平台 - SMAP平台</title>
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/l2-frame.css">
</head>
<body>
<div class="l2-container">
  <aside class="sidebar-l2" id="sidebarL2">
    <div class="l2-header">
      <span id="l2Title">能力平台</span>
      <span class="l2-toggle" id="l2Toggle" title="折叠">&#9664;</span>
    </div>
    <div class="l2-list" id="l2List"></div>
  </aside>
  <main class="l2-content">
    <iframe id="l2Frame" src="builder/index.html"></iframe>
  </main>
</div>
<script>
const menuData = [
  { icon: "&#129302;", label: "能力广场", page: "builder/index.html" },
  { icon: "&#129302;", label: "智能体开发", page: "builder/agent-dev.html" },
  { icon: "&#128295;", label: "技能开发", page: "builder/skill-dev.html" },
  { icon: "&#128202;", label: "数据集市", page: "builder/data-market.html" },
  { type: "divider" },
  { icon: "🧩", label: "组件与插件", page: "builder/plugins.html" },
  { icon: "&#128196;", label: "API管理", page: "builder/api-manage.html" },
  { icon: "&#128640;", label: "模型中心", page: "builder/model-center.html" },
  { type: "divider" },
  { icon: "&#128736;", label: "工具箱", page: "builder/toolkit.html" },
  { icon: "&#128203;", label: "开发文档", page: "builder/docs.html" },
  { icon: "&#128101;", label: "开发者社区", page: "builder/community.html" }
];

let l2Collapsed = false;
const list = document.getElementById('l2List');
const frame = document.getElementById('l2Frame');

function renderMenu() {
  list.innerHTML = menuData.map((item, i) => {
    if (item.type === 'divider') {
      return '<div class="l2-divider"></div>';
    }
    if (item.isHeader) {
      return '<div class="l2-header-title">' + item.label + '</div>';
    }
    return '<div class="l2-item ' + (i === 0 ? 'active' : '') + '" data-index="' + i + '"><span class="l2-icon">' + item.icon + '</span>' + item.label + '</div>';
  }).join('');
  list.querySelectorAll('.l2-item').forEach(el => {
    el.addEventListener('click', () => {
      list.querySelectorAll('.l2-item').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
      frame.src = menuData[el.dataset.index].page;
    });
  });
}

document.getElementById('l2Toggle').addEventListener('click', () => {
  l2Collapsed = !l2Collapsed;
  document.getElementById('sidebarL2').classList.toggle('collapsed', l2Collapsed);
  document.getElementById('l2Toggle').innerHTML = l2Collapsed ? '&#9654;' : '&#9664;';
});

renderMenu();
</script>
</body>
</html>
