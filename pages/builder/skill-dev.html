<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技能开发 - 能力平台 - SMAP平台</title>
<link rel="stylesheet" href="../../css/variables.css">
<link rel="stylesheet" href="../../css/common.css">
<link rel="stylesheet" href="../../css/layout.css">
<style>
.dev-hero { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 20px; padding: 40px 20px; }
.dev-hero-icon { font-size: 72px; opacity: 0.4; filter: drop-shadow(0 0 20px rgba(6,182,212,0.3)); }
.dev-hero-title { font-size: 24px; font-weight: 700; color: #fff; }
.dev-hero-desc { font-size: 14px; color: var(--text-muted); text-align: center; max-width: 400px; line-height: 1.6; }
.dev-hero-tags { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
.dev-hero-tag { padding: 4px 12px; background: rgba(6,182,212,0.1); border: 1px solid rgba(6,182,212,0.25); border-radius: 16px; font-size: 12px; color: #22d3ee; }
.dev-features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; max-width: 720px; margin: 0 auto 40px; padding: 0 20px; }
.dev-feat-card { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 18px; text-align: center; }
.dev-feat-icon { font-size: 28px; margin-bottom: 8px; }
.dev-feat-title { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 4px; }
.dev-feat-desc { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
</style>
</head>
<body>
<a class="l3-back-btn" href="index.html">← 返回能力广场</a>

<div class="dev-hero">
  <div class="dev-hero-icon">⚡</div>
  <div class="dev-hero-title">技能开发工作台</div>
  <div class="dev-hero-desc">定义、封装和发布可复用技能。支持 REST API 对接、数据源配置和逻辑编排。</div>
  <div class="dev-hero-tags">
    <span class="dev-hero-tag">API对接</span>
    <span class="dev-hero-tag">数据源配置</span>
    <span class="dev-hero-tag">逻辑编排</span>
    <span class="dev-hero-tag">参数管理</span>
    <span class="dev-hero-tag">版本控制</span>
  </div>
</div>

<div class="dev-features">
  <div class="dev-feat-card">
    <div class="dev-feat-icon">🔗</div>
    <div class="dev-feat-title">API接入</div>
    <div class="dev-feat-desc">对接外部系统接口，快速接入业务数据</div>
  </div>
  <div class="dev-feat-card">
    <div class="dev-feat-icon">🗄️</div>
    <div class="dev-feat-title">数据源管理</div>
    <div class="dev-feat-desc">配置数据库、文件等数据源连接</div>
  </div>
  <div class="dev-feat-card">
    <div class="dev-feat-icon">⚙️</div>
    <div class="dev-feat-title">逻辑编排</div>
    <div class="dev-feat-desc">可视化配置技能的执行流程和参数</div>
  </div>
  <div class="dev-feat-card">
    <div class="dev-feat-icon">🧪</div>
    <div class="dev-feat-title">在线调试</div>
    <div class="dev-feat-desc">模拟调用测试，验证输入输出效果</div>
  </div>
  <div class="dev-feat-card">
    <div class="dev-feat-icon">📋</div>
    <div class="dev-feat-title">技能模板</div>
    <div class="dev-feat-desc">基于模板快速创建常用技能</div>
  </div>
  <div class="dev-feat-card">
    <div class="dev-feat-icon">📤</div>
    <div class="dev-feat-title">发布共享</div>
    <div class="dev-feat-desc">发布到能力广场供其他智能体引用</div>
  </div>
</div>

</body>
</html>
