<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技能详情 - 报警根因分析 - SMAP平台</title>
<link rel="stylesheet" href="../../css/variables.css">
<link rel="stylesheet" href="../../css/common.css">

<style>
/* ========== 技能详情页 ========== */
html, body { overflow: auto !important; height: auto !important; }
.page-skill-detail { padding: 16px; background: var(--bg-deep); min-height: 100vh; overflow-y: auto; }
.skill-detail-main { display: flex; flex-direction: column; gap: 14px; max-width: 960px; margin: 0 auto; }

/* 技能主题色：cyan / teal */
:root {
  --skill-accent: #06b6d4;
  --skill-accent-light: #22d3ee;
  --skill-accent-dim: rgba(6,182,212,0.15);
  --skill-accent-border: rgba(6,182,212,0.3);
  --skill-accent-glow: rgba(6,182,212,0.4);
}

/* ========== 1. 头部信息区（非工卡） ========== */
.skill-header {
  background: linear-gradient(135deg, #0f1d2e 0%, #0c1825 100%);
  border: 1px solid var(--skill-accent-border);
  border-radius: 16px;
  padding: 24px;
  position: relative;
  overflow: hidden;
}
/* 背景装饰 */
.skill-header::before {
  content: '';
  position: absolute;
  top: -60px; right: -40px;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(6,182,212,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.skill-header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 16px;
  position: relative;
}
.skill-header-left { flex: 1; }
.skill-header-breadcrumb {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.skill-header-breadcrumb a { color: var(--text-muted); text-decoration: none; }
.skill-header-breadcrumb a:hover { color: var(--skill-accent); }
.skill-header-title-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}
.skill-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--skill-accent), var(--skill-accent-light));
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  box-shadow: 0 4px 20px var(--skill-accent-glow);
  flex-shrink: 0;
}
.skill-title {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
}
.skill-version {
  font-size: 11px;
  font-family: monospace;
  padding: 3px 10px;
  background: var(--skill-accent-dim);
  border: 1px solid var(--skill-accent-border);
  border-radius: 10px;
  color: var(--skill-accent-light);
}
.skill-header-desc {
  font-size: 13px;
  line-height: 1.7;
  color: var(--text-secondary);
  margin-bottom: 16px;
}
.skill-header-meta {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}
.skill-meta-item {
  display: flex;
  align-items: center;
  gap: 6px;
}
.skill-meta-icon {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: var(--skill-accent-dim);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
}
.skill-meta-value {
  font-size: 18px;
  font-weight: 700;
  color: var(--skill-accent-light);
}
.skill-meta-label {
  font-size: 10px;
  color: var(--text-muted);
}
/* 编辑按钮 */
.skill-edit-btn {
  padding: 10px 22px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--skill-accent-border);
  background: var(--skill-accent-dim);
  color: var(--skill-accent-light);
  transition: all .2s;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.skill-edit-btn:hover {
  background: rgba(6,182,212,0.25);
  box-shadow: 0 4px 16px var(--skill-accent-glow);
  transform: translateY(-1px);
}

/* ========== 2. 标签 ========== */
.skill-section {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: 14px;
  padding: 18px;
}
.section-title {
  font-size: 13px; font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 6px;
}
.skill-tags {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.skill-tag {
  padding: 5px 14px;
  background: var(--skill-accent-dim);
  border: 1px solid var(--skill-accent-border);
  border-radius: 16px;
  font-size: 11px;
  color: var(--skill-accent-light);
}
.skill-tag.cat {
  background: rgba(139,92,246,0.12);
  border-color: rgba(139,92,246,0.3);
  color: #a78bfa;
}
.skill-tag.type {
  background: rgba(34,197,94,0.12);
  border-color: rgba(34,197,94,0.3);
  color: #4ade80;
}

/* ========== 3. 输入 / 输出 ========== */
.skill-io-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.skill-io-card {
  background: var(--bg-elevated);
  border-radius: 12px;
  padding: 16px;
}
.skill-io-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.skill-io-label .io-arrow {
  color: var(--skill-accent);
  font-size: 14px;
}
.skill-io-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.skill-io-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 8px;
}
.skill-io-item-icon {
  width: 28px; height: 28px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
}
.skill-io-item-icon.input-icon {
  background: rgba(96,165,250,0.12);
  color: #60a5fa;
}
.skill-io-item-icon.output-icon {
  background: rgba(34,197,94,0.12);
  color: #4ade80;
}
.skill-io-item-info { flex: 1; }
.skill-io-item-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 2px;
}
.skill-io-item-desc {
  font-size: 10px;
  color: var(--text-muted);
}
.skill-io-required {
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 6px;
  flex-shrink: 0;
}
.skill-io-required.yes {
  background: rgba(239,68,68,0.12);
  color: #f87171;
}
.skill-io-required.no {
  background: rgba(100,116,139,0.12);
  color: #94a3b8;
}

/* ========== 4. 技能内容预览（MD 文件） ========== */
.skill-md-section {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: 14px;
  padding: 18px;
  display: flex;
  flex-direction: column;
}
.skill-md-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.skill-md-filename {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-muted);
  font-family: monospace;
}
.skill-md-filename .file-badge {
  padding: 2px 8px;
  background: rgba(96,165,250,0.12);
  border-radius: 6px;
  color: #60a5fa;
  font-size: 10px;
}
.skill-md-copy {
  font-size: 11px;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 6px;
  transition: all .2s;
  background: rgba(255,255,255,0.04);
}
.skill-md-copy:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
.skill-md-body {
  background: var(--bg-elevated);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 16px;
  max-height: 320px;
  overflow-y: auto;
  font-family: "SF Mono", "Menlo", "Monaco", "Courier New", monospace;
  font-size: 12px;
  line-height: 1.8;
  color: var(--text-secondary);
}
.skill-md-body::-webkit-scrollbar { width: 6px; }
.skill-md-body::-webkit-scrollbar-track { background: transparent; }
.skill-md-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
.skill-md-body::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
/* MD 内容格式化 */
.md-h1 { font-size: 16px; font-weight: 700; color: #fff; margin: 12px 0 6px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 6px; }
.md-h2 { font-size: 14px; font-weight: 600; color: var(--skill-accent-light); margin: 10px 0 4px; }
.md-h3 { font-size: 13px; font-weight: 600; color: var(--text-primary); margin: 8px 0 4px; }
.md-p { margin: 4px 0; }
.md-code { color: #fbbf24; background: rgba(251,191,36,0.08); padding: 1px 5px; border-radius: 3px; font-size: 11px; }
.md-bold { color: #fff; font-weight: 600; }
.md-list { padding-left: 16px; }
.md-list li { margin: 2px 0; }
.md-list li::marker { color: var(--skill-accent); }

/* ========== 5. 关联的数字员工 ========== */
.skill-staff-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.skill-staff-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px;
  background: var(--bg-elevated);
  border-radius: 10px;
  cursor: pointer;
  transition: all .2s;
  border: 1px solid transparent;
}
.skill-staff-item:hover {
  background: rgba(139,92,246,0.08);
  border-color: rgba(139,92,246,0.2);
}
.skill-staff-avatar {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.skill-staff-info { flex: 1; min-width: 0; }
.skill-staff-name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
.skill-staff-role { font-size: 10px; color: var(--text-muted); }
.skill-staff-badge {
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 8px;
  flex-shrink: 0;
  font-weight: 500;
}
.skill-staff-badge.owner {
  background: rgba(139,92,246,0.15);
  color: #a78bfa;
}
.skill-staff-badge.shared {
  background: rgba(96,165,250,0.12);
  color: #60a5fa;
}

/* ========== 6. Token 消耗 ========== */
.skill-token-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
.skill-token-card {
  background: var(--bg-elevated);
  border-radius: 10px;
  padding: 16px;
  text-align: center;
}
.skill-token-value { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.skill-token-value.cyan { color: var(--skill-accent-light); }
.skill-token-value.green { color: #4ade80; }
.skill-token-value.blue { color: #60a5fa; }
.skill-token-value.amber { color: #fbbf24; }
.skill-token-label { font-size: 11px; color: var(--text-muted); }
.skill-token-bar { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; margin-top: 10px; overflow: hidden; }
.skill-token-fill { height: 100%; border-radius: 2px; }
.skill-token-fill.cyan { background: linear-gradient(90deg, var(--skill-accent), var(--skill-accent-light)); }
.skill-token-fill.green { background: linear-gradient(90deg, #22c55e, #4ade80); }
.skill-token-fill.blue { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
.skill-token-fill.amber { background: linear-gradient(90deg, #f59e0b, #fbbf24); }

/* ========== 7. 引用次数 ========== */
.skill-ref-bar {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 18px;
  background: var(--bg-elevated);
  border-radius: 12px;
}
.skill-ref-item {
  display: flex;
  align-items: center;
  gap: 8px;
}
.skill-ref-value {
  font-size: 20px;
  font-weight: 700;
  color: var(--skill-accent-light);
}
.skill-ref-label { font-size: 11px; color: var(--text-muted); }
.skill-ref-divider {
  width: 1px;
  height: 28px;
  background: rgba(255,255,255,0.08);
}

/* ========== 8. 迭代记录（复用 profile 的 timeline） ========== */
.skill-evolution-timeline {
  position: relative;
  padding-left: 24px;
}
.skill-evolution-timeline::before {
  content: '';
  position: absolute;
  left: 7px; top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(180deg, var(--skill-accent), rgba(6,182,212,0.15));
}
.evo-item {
  position: relative;
  padding-bottom: 14px;
}
.evo-item:last-child { padding-bottom: 0; }
.evo-dot {
  position: absolute;
  left: -20px; top: 4px;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--skill-accent);
  border: 3px solid var(--bg-deep);
}
.evo-dot.current { background: #22c55e; box-shadow: 0 0 12px rgba(34,197,94,0.6); }
.evo-version {
  font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 3px;
  display: flex; align-items: center; gap: 6px;
}
.evo-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 8px;
  font-size: 9px;
}
.evo-tag.major { background: rgba(239,68,68,0.15); color: #f87171; }
.evo-tag.minor { background: rgba(96,165,250,0.15); color: #60a5fa; }
.evo-tag.fix { background: rgba(34,197,94,0.15); color: #4ade80; }
.evo-date { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }
.evo-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }

/* ========== 两列布局辅助 ========== */
.skill-row-2col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

/* ========== 锚点导航 ========== */
.skill-toc {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 10px 16px;
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: 12px;
  overflow-x: auto;
  flex-wrap: nowrap;
  scrollbar-width: none;
}
.skill-toc::-webkit-scrollbar { display: none; }
.skill-toc-item {
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
  cursor: pointer;
  transition: all .2s;
  flex-shrink: 0;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
}
.skill-toc-item:hover { background: rgba(255,255,255,0.06); color: var(--text-primary); }
.skill-toc-item.active {
  background: var(--skill-accent-dim);
  color: var(--skill-accent-light);
  font-weight: 500;
}
.skill-toc-divider {
  width: 1px;
  height: 16px;
  background: rgba(255,255,255,0.1);
  flex-shrink: 0;
}
/* 固定导航 */
.skill-toc-fixed {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  width: 100%;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  border-radius: 0;
}

/* 动态渲染需要的额外样式 */
.skill-section-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 14px; }
.skill-tag-list { display: flex; gap: 8px; flex-wrap: wrap; }
.skill-tag-item { padding: 4px 12px; border-radius: 12px; font-size: 12px; border: 1px solid; }
.skill-feature-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.skill-feature-item { display: flex; align-items: center; gap: 10px; padding: 12px; background: var(--bg-elevated); border-radius: 10px; }
.skill-feature-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; }
.skill-feature-text { font-size: 13px; color: var(--text-primary); }
.skill-io-item { display: flex; gap: 12px; margin-bottom: 10px; padding: 12px; background: var(--bg-elevated); border-radius: 10px; }
.skill-io-label { width: 60px; flex-shrink: 0; font-size: 12px; color: var(--text-muted); }
.skill-io-value { flex: 1; font-size: 13px; color: var(--text-primary); }
</style>

function getSkillId() {
  var params = new URLSearchParams(window.location.search);
  return params.get('id') || 'SK-ALARM-001';
}

function renderSkill(skillId) {
  var data = skillData[skillId];
  if (!data) return;
  
  document.title = '技能详情 - ' + data.name + ' - SMAP平台';
  
  // 设置主题色
  document.documentElement.style.setProperty('--skill-accent', data.color);
  document.documentElement.style.setProperty('--skill-accent-light', data.color + 'aa');
  document.documentElement.style.setProperty('--skill-accent-dim', data.color + '26');
  document.documentElement.style.setProperty('--skill-accent-border', data.color + '4d');
  document.documentElement.style.setProperty('--skill-accent-glow', data.color + '66');
  
  var html = '<a class="l3-back-btn" href="../builder/index.html">← 返回能力广场</a>';
  html += '<div class="skill-detail-main">';
  
  // 头部
  html += '<div class="skill-header">';
  html += '<div class="skill-header-top">';
  html += '<div class="skill-header-left">';
  html += '<div class="skill-header-breadcrumb">';
  html += '<span>技能中心</span><span>/</span><span>' + data.category + '</span><span>/</span><span style="color:var(--text-secondary)">' + data.name + '</span>';
  html += '</div>';
  html += '<div class="skill-header-title-row">';
  html += '<div class="skill-icon">' + data.icon + '</div>';
  html += '<div class="skill-title">' + data.name + '</div>';
  html += '<span class="skill-version">' + data.version + '</span>';
  html += '</div>';
  html += '<div class="skill-header-desc">' + data.desc + '</div>';
  html += '<div class="skill-header-meta">';
  html += '<div class="skill-meta-item"><div class="skill-meta-icon">🔗</div><div><div class="skill-meta-value">' + data.refs + '</div><div class="skill-meta-label">被引用次数</div></div></div>';
  html += '<div class="skill-meta-item"><div class="skill-meta-icon">⚡</div><div><div class="skill-meta-value">' + data.calls + '</div><div class="skill-meta-label">调用次数</div></div></div>';
  html += '<div class="skill-meta-item"><div class="skill-meta-icon">🎯</div><div><div class="skill-meta-value">' + data.accuracy + '</div><div class="skill-meta-label">准确率</div></div></div>';
  html += '</div></div>';
  html += '<button class="skill-edit-btn" style="background:' + data.color + '26;border-color:' + data.color + '4d;color:' + data.color + ';">✏️ 编辑技能</button>';
  html += '</div></div>';
  
  // 标签
  html += '<div class="skill-tags"><span class="skill-section-title">技能标签</span><div class="skill-tag-list">';
  for (var i = 0; i < data.tags.length; i++) {
    html += '<span class="skill-tag-item" style="background:' + data.color + '15;border-color:' + data.color + '30;color:' + data.color + ';">' + data.tags[i] + '</span>';
  }
  html += '</div></div>';
  
  // 功能特性
  html += '<div class="skill-section"><div class="skill-section-title">功能特性</div><div class="skill-feature-grid">';
  for (var i = 0; i < data.features.length; i++) {
    html += '<div class="skill-feature-item"><div class="skill-feature-icon" style="background:' + data.color + '15;color:' + data.color + ';">✓</div><div class="skill-feature-text">' + data.features[i] + '</div></div>';
  }
  html += '</div></div>';
  
  // 输入输出
  html += '<div class="skill-section"><div class="skill-section-title">输入输出</div>';
  html += '<div class="skill-io-item"><div class="skill-io-label">输入</div><div class="skill-io-value">' + data.input + '</div></div>';
  html += '<div class="skill-io-item"><div class="skill-io-label">输出</div><div class="skill-io-value">' + data.output + '</div></div>';
  html += '</div>';
  
  html += '</div></div>';
  
  document.getElementById('skillContent').innerHTML = html;
}

document.addEventListener('DOMContentLoaded', function() {
  renderSkill(getSkillId());
});
</script>
