<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>专家智库 - SMAP平台</title>
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/layout.css">
<style>
.page-experts { padding: 12px; }
.exp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.exp-card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 16px;
}
.exp-card-title {
  font-size: 14px; font-weight: 600;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.exp-item {
  padding: 8px 10px;
  background: rgba(22,119,255,0.05);
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  font-size: 12px;
  display: flex; justify-content: space-between;
  cursor: pointer;
}
.exp-item:hover { background: rgba(22,119,255,0.1); }
.exp-count { color: var(--text-muted); }
</style>
</head>
<body class="page-experts">
<div class="exp-grid">
  <div class="exp-card">
    <div class="exp-card-title">&#128218; 安全法规库</div>
    <div class="exp-item"><span>国家法律法规</span><span class="exp-count">156</span></div>
    <div class="exp-item"><span>部门规章</span><span class="exp-count">89</span></div>
    <div class="exp-item"><span>规范性文件</span><span class="exp-count">234</span></div>
  </div>
  <div class="exp-card">
    <div class="exp-card-title">&#128218; 标准规范库</div>
    <div class="exp-item"><span>GB标准</span><span class="exp-count">456</span></div>
    <div class="exp-item"><span>AQ行业标准</span><span class="exp-count">128</span></div>
    <div class="exp-item"><span>HG化工标准</span><span class="exp-count">89</span></div>
  </div>
  <div class="exp-card">
    <div class="exp-card-title">&#128218; 检查清单库</div>
    <div class="exp-item"><span>安全检查表</span><span class="exp-count">45</span></div>
    <div class="exp-item"><span>隐患排查清单</span><span class="exp-count">78</span></div>
    <div class="exp-item"><span>专项检查表</span><span class="exp-count">23</span></div>
  </div>
  <div class="exp-card">
    <div class="exp-card-title">&#128218; 安全隐患库</div>
    <div class="exp-item"><span>典型隐患案例</span><span class="exp-count">312</span></div>
    <div class="exp-item"><span>整改措施参考</span><span class="exp-count">245</span></div>
  </div>
  <div class="exp-card">
    <div class="exp-card-title">&#128218; 事故案例库</div>
    <div class="exp-item"><span>危化品事故案例</span><span class="exp-count">189</span></div>
    <div class="exp-item"><span>调查报告</span><span class="exp-count">67</span></div>
  </div>
  <div class="exp-card">
    <div class="exp-card-title">&#128218; 政策问答库</div>
    <div class="exp-item"><span>安全政策解读</span><span class="exp-count">89</span></div>
    <div class="exp-item"><span>常见问题解答</span><span class="exp-count">156</span></div>
  </div>
</div>
</body>
</html>
