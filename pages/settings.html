<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设置 - SMAP平台</title>
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/common.css">
<link rel="stylesheet" href="../css/l2-frame.css">
</head>
<body>
<div class="l2-container">
  <aside class="sidebar-l2" id="sidebarL2">
    <div class="l2-header">
      <span id="l2Title">设置</span>
      <span class="l2-toggle" id="l2Toggle" title="折叠">&#9664;</span>
    </div>
    <div class="l2-list" id="l2List"></div>
  </aside>
  <main class="l2-content">
    <iframe id="l2Frame" src="settings/users.html"></iframe>
  </main>
</div>
<script>
const menuData = [
  { icon: "&#128100;", label: "用户管理", page: "settings/users.html" },
  { icon: "&#128272;", label: "角色权限", page: "settings/roles.html" },
  { icon: "&#9881;", label: "系统配置", page: "settings/system.html" },
  { icon: "&#128210;", label: "日志审计", page: "settings/logs.html" },
  { icon: "&#128190;", label: "数据备份", page: "settings/backup.html" }
];

let l2Collapsed = false;
const list = document.getElementById('l2List');
const frame = document.getElementById('l2Frame');

function renderMenu() {
  list.innerHTML = menuData.map((item, i) =>
    `<div class="l2-item ${i === 0 ? 'active' : ''}" data-index="${i}">
      <span class="l2-icon">${item.icon}</span>${item.label}
    </div>`
  ).join('');
  list.querySelectorAll('.l2-item').forEach(el => {
    el.addEventListener('click', () => {
      list.querySelectorAll('.l2-item').forEach(e => e.classList.remove('active'));
      el.classList.add('active');
      frame.src = menuData[el.dataset.index].page;
    });
  });
}

document.getElementById('l2Toggle').addEventListener('click', () => {
  l2Collapsed = !l2Collapsed;
  document.getElementById('sidebarL2').classList.toggle('collapsed', l2Collapsed);
  document.getElementById('l2Toggle').innerHTML = l2Collapsed ? '&#9654;' : '&#9664;';
});

renderMenu();
</script>
</body>
</html>
