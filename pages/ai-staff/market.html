<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能体市场 - 数字员工 - SMAP平台</title>
<link rel="stylesheet" href="../../css/variables.css">
<link rel="stylesheet" href="../../css/common.css">
<link rel="stylesheet" href="../../css/layout.css">
<style>
/* 数字员工主页 - 单栏布局 */
.page-ai-staff { padding: 12px; }
.ai-main { display: flex; flex-direction: column; gap: 12px; }

/* 智能体卡片 */
.ai-agent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.ai-agent-card {
  padding: 16px;
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  cursor: pointer;
  transition: all .2s;
  display: flex; align-items: center; gap: 12px;
}
.ai-agent-card:hover { border-color: var(--primary); transform: translateY(-2px); }
.ai-agent-card.active { border-color: var(--primary); background: rgba(22,119,255,0.08); }
.ai-agent-avatar {
  width: 48px; height: 48px;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.ai-agent-info { flex: 1; }
.ai-agent-name { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.ai-agent-desc { font-size: 12px; color: var(--text-muted); }
.ai-agent-status { padding: 2px 10px; border-radius: 12px; font-size: 11px; }
.ai-agent-status.online { background: rgba(82,196,26,0.15); color: var(--status-green); }
.ai-agent-status.offline { background: rgba(74,106,138,0.15); color: var(--text-muted); }

/* 对话区域 */
.ai-chat {
  flex: 1;
  display: flex; flex-direction: column;
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  overflow: hidden;
  min-height: 400px;
}
.ai-chat-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-subtle);
  display: flex; align-items: center; justify-content: space-between;
}
.ai-chat-title { font-size: 14px; font-weight: 600; }
.ai-chat-body {
  flex: 1; padding: 16px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 12px;
}
.chat-msg { display: flex; gap: 10px; max-width: 80%; }
.chat-msg.user { align-self: flex-end; flex-direction: row-reverse; }
.chat-msg.ai { align-self: flex-start; }
.chat-bubble { padding: 10px 14px; border-radius: var(--radius-md); font-size: 13px; line-height: 1.6; }
.chat-msg.user .chat-bubble { background: var(--primary); color: #fff; }
.chat-msg.ai .chat-bubble { background: var(--bg-elevated); color: var(--text-secondary); border: 1px solid var(--border-subtle); }
.chat-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.chat-avatar.ai { background: rgba(22,119,255,0.12); color: var(--primary-light); }
.chat-avatar.user { background: var(--primary); color: #fff; }

.ai-input-area { padding: 12px; border-top: 1px solid var(--border-subtle); display: flex; gap: 8px; }
.ai-input-area input { flex: 1; background: rgba(22,119,255,0.05); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); padding: 10px 14px; color: var(--text-primary); font-size: 13px; }
.ai-input-area input:focus { border-color: var(--primary); outline: none; }

/* 知识增强 */
.knowledge-panel { display: flex; gap: 8px; flex-wrap: wrap; }
.knowledge-item { padding: 6px 12px; background: rgba(22,119,255,0.08); border: 1px solid var(--border-subtle); border-radius: 20px; font-size: 12px; }
</style>
</head>
<body class="page-ai-staff">
<div class="ai-main">
  <!-- 智能体市场 -->
  <div class="card">
    <div class="card-title">智能体市场</div>
    <div class="ai-agent-grid">
      <div class="ai-agent-card active">
        <div class="ai-agent-avatar">&#128295;</div>
        <div class="ai-agent-info">
          <div class="ai-agent-name">报警诊断助手</div>
          <div class="ai-agent-desc">专注报警分析与诊断</div>
        </div>
        <div class="ai-agent-status online">在线</div>
      </div>
      <div class="ai-agent-card">
        <div class="ai-agent-avatar">&#128200;</div>
        <div class="ai-agent-info">
          <div class="ai-agent-name">异常工况诊断</div>
          <div class="ai-agent-desc">工艺异常智能分析</div>
        </div>
        <div class="ai-agent-status online">在线</div>
      </div>
      <div class="ai-agent-card">
        <div class="ai-agent-avatar">&#128736;</div>
        <div class="ai-agent-info">
          <div class="ai-agent-name">作业风险评估</div>
          <div class="ai-agent-desc">作业票风险评估</div>
        </div>
        <div class="ai-agent-status online">在线</div>
      </div>
      <div class="ai-agent-card">
        <div class="ai-agent-avatar">&#128657;</div>
        <div class="ai-agent-info">
          <div class="ai-agent-name">应急辅助决策</div>
          <div class="ai-agent-desc">应急响应决策支持</div>
        </div>
        <div class="ai-agent-status online">在线</div>
      </div>
      <div class="ai-agent-card">
        <div class="ai-agent-avatar">&#128196;</div>
        <div class="ai-agent-info">
          <div class="ai-agent-name">报告生成</div>
          <div class="ai-agent-desc">智能报告生成</div>
        </div>
        <div class="ai-agent-status offline">离线</div>
      </div>
    </div>
  </div>

  <!-- AI对话区 -->
  <div class="ai-chat">
    <div class="ai-chat-header">
      <div class="ai-chat-title">&#128295; 报警诊断助手</div>
      <button class="btn btn-ghost">新建对话</button>
    </div>
    <div class="ai-chat-body">
      <div class="chat-msg ai">
        <div class="chat-avatar ai">&#129302;</div>
        <div class="chat-bubble">您好！我是报警诊断助手，可以帮您分析报警原因、诊断异常工况。请告诉我需要诊断的报警信息。</div>
      </div>
    </div>
    <div class="ai-input-area">
      <input type="text" placeholder="输入您的问题..." />
      <button class="btn btn-primary">发送</button>
    </div>
  </div>

  <!-- 知识增强 -->
  <div class="card">
    <div class="card-title">知识增强</div>
    <div class="knowledge-panel">
      <div class="knowledge-item">&#128218; 企业知识库 - 156份文档</div>
      <div class="knowledge-item">&#128218; 专家智库 - 法规/标准/案例</div>
      <div class="knowledge-item">&#128268; 实时数据 - DCS/GDS/SIS</div>
    </div>
  </div>
</div>
</body>
</html>
