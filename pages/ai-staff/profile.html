  align-items: stretch;
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
  border: 1px solid rgba(139,92,246,0.3);
  border-radius: 16px;
  overflow: hidden;
  min-height: 200px;
}
.staff-badge-left {
  width: 220px;
  flex-shrink: 0;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(180deg, rgba(139,92,246,0.15) 0%, transparent 100%);
  border-right: 1px solid rgba(255,255,255,0.08);
}
.staff-badge-avatar {
  width: 90px; height: 90px;
  border-radius: 50%;
  background: linear-gradient(135deg, #8b5cf6, #a78bfa);
  display: flex; align-items: center; justify-content: center;
  font-size: 40px;
  box-shadow: 0 4px 30px rgba(139,92,246,0.5);
  margin-bottom: 14px;
  position: relative;
}
.staff-badge-status-dot {
  position: absolute;
  bottom: 6px; right: 6px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #22c55e;
  border: 3px solid #0f172a;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100%{opacity:1;box-shadow: 0 0 8px #22c55e;}
  50%{opacity:0.7;box-shadow: 0 0 4px #22c55e;}
}
.staff-badge-name {
  font-size: 24px; font-weight: 700;
  background: linear-gradient(135deg, #fff, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
.staff-badge-role {
  font-size: 12px; color: rgba(255,255,255,0.6);
  margin-bottom: 10px;
}
.staff-badge-code {
  font-size: 10px; color: rgba(255,255,255,0.35);
  font-family: monospace;
  padding: 4px 10px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
}
.staff-badge-right {
  flex: 1;
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.staff-badge-intro {
  font-size: 13px;
  line-height: 1.7;
  color: rgba(255,255,255,0.8);
  margin-bottom: 14px;
}
.staff-badge-stats {
  display: flex;
  gap: 14px;
}
.staff-badge-stat {
  text-align: center;
}
.staff-badge-stat-value {
  font-size: 18px;
  font-weight: 700;
  color: #8b5cf6;
}
.staff-badge-stat-label {
  font-size: 10px;
  color: rgba(255,255,255,0.4);
}

/* ========== 2. 当前任务 ========== */
.staff-current-task {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: 14px;
  padding: 18px;
}
.section-title {
  font-size: 13px; font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 6px;
}
.current-task-main {
  display: flex; align-items: center; gap: 14px;
  padding: 16px;
  background: rgba(139,92,246,0.1);
  border: 1px solid rgba(139,92,246,0.25);
  border-radius: 12px;
}
.current-task-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: linear-gradient(135deg, #8b5cf6, #a78bfa);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.current-task-info { flex: 1; }
.current-task-name { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 4px; }
.current-task-meta { font-size: 12px; color: var(--text-muted); }
.current-task-progress { width: 100px; text-align: right; }
.progress-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-bottom: 6px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #8b5cf6, #a78bfa); border-radius: 3px; }
.progress-text { font-size: 12px; color: var(--text-muted); }

/* ========== 3. 等待队列 ========== */
.staff-queue {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: 14px;
  padding: 18px;
  margin-top: 14px;
}
.queue-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
}
.queue-item {
  padding: 12px;
  background: var(--bg-elevated);
  border-radius: 10px;
  display: flex; flex-direction: column; gap: 6px;
}
.queue-item-name { font-size: 12px; color: var(--text-primary); }
.queue-item-time { font-size: 10px; color: var(--text-muted); }

/* ========== 4. 今日成果 ========== */
.staff-output {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: 14px;
  padding: 18px;
}
.output-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
}
.output-item {
  display: flex; align-items: center; gap: 10px;
  padding: 14px;
  background: var(--bg-elevated);
  border-radius: 10px;
}
.output-icon {
  width: 36px; height: 36px;
  border-radius: 8px;
  background: rgba(96,165,250,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: #60a5fa;
  flex-shrink: 0;
}
.output-info { flex: 1; min-width: 0; }
.output-name { font-size: 12px; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.output-meta { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
.output-status {
  font-size: 10px; padding: 3px 8px;
  border-radius: 10px;
  flex-shrink: 0;
}
.output-status.done { background: rgba(34,197,94,0.15); color: #22c55e; }
.output-status.pending { background: rgba(251,146,60,0.15); color: #fb923c; }
.output-status.doing { background: rgba(139,92,246,0.15); color: #a78bfa; }

/* ========== 5. 协作员工 ========== */
.staff-collab {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: 14px;
  padding: 18px;
}
.collab-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
}
.collab-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px;
  background: var(--bg-elevated);
  border-radius: 10px;
  cursor: pointer;
  transition: all .2s;
}
.collab-item:hover { background: rgba(139,92,246,0.12); }
.collab-avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;

.collab-info { flex: 1; min-width: 0; }
.collab-name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
.collab-role { font-size: 10px; color: var(--text-muted); margin-bottom: 4px; }
.collab-metrics { display: flex; gap: 4px; flex-wrap: wrap; }
.collab-metric {
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 6px;
  background: rgba(96,165,250,0.15);
  color: #60a5fa;
}

/* ========== 6. 任务数据 ========== */

.task-data-value.purple { color: #a78bfa; }
.task-data-value.orange { color: #fb923c; }
.task-data-label { font-size: 11px; color: var(--text-muted); }

.evolution-item {
  position: relative;
  padding-bottom: 16px;

  margin-right: 4px;

.evolution-tag.minor { background: rgba(96,165,250,0.15); color: #60a5fa; }

.fail-reason { font-size: 11px; color: #ef4444; margin-bottom: 2px; }

/* 固定导航 */

// 获取URL参数
function getStaffId() {
  var params = new URLSearchParams(window.location.search);
  return params.get('staff') || 'an';
}

function getFrom() {
  var params = new URLSearchParams(window.location.search);
  return params.get('from') || 'roster';  // market | roster
}

function isInstalled() {
  var params = new URLSearchParams(window.location.search);
  return params.get('installed') === 'true';
}

// 渲染页面
function renderProfile(staffId) {
  var data = staffData[staffId];
  if (!data) return;
  document.title = data.name + ' - 数字员工 - SMAP平台';

  var from = getFrom();
  var installed = isInstalled();

  // 根据来源显示不同按钮
  var actionBtn = '';
  if (from === 'market' && !installed) {
    actionBtn = '<button class="staff-action-btn" style="background:linear-gradient(135deg,#8b5cf6,#a78bfa);color:#fff;padding:10px 24px;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;" onclick="alert(\'添加成功！\')">➕ 添加到我的数字员工</button>';
  } else {
    actionBtn = '<button class="staff-action-btn" style="background:linear-gradient(135deg,#06b6d4,#22d3ee);color:#fff;padding:10px 24px;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;" onclick="location.href=\'chat.html\'">💬 开始对话</button>';
  }

  var html = '<a class="l3-back-btn" href="' + (from === 'market' ? 'market.html' : from === 'workspace' ? '../workspace.html' : 'roster.html') + '">' + (from === 'market' ? '← 返回智能体市场' : from === 'workspace' ? '← 返回工作台' : '← 返回我的员工') + '</a>';

  html += '<div class="staff-detail-main">';

  // Badge区域，按钮嵌入到stats下面
  var badgeHtml = '<div class="staff-badge"><div class="staff-badge-left"><div class="staff-badge-avatar"><img src="../../assets/images/' + data.avatar + '" style="width:100%;height:100%;object-fit:cover;border-radius:90px;"><div class="staff-badge-status-dot"></div></div><div class="staff-badge-name">' + data.name + '</div><div class="staff-badge-role">' + data.role + '</div><div class="staff-badge-code">' + data.code + '</div></div><div class="staff-badge-right"><div class="staff-badge-intro">' + data.intro + ' 累计处理<span style="color:' + data.color + ';font-weight:600;">' + data.stats.calls + '次</span>，准确率<span style="color:#22c55e;font-weight:600;">' + data.stats.rate + '</span>。</div><div class="staff-badge-stats"><div class="staff-badge-stat"><div class="staff-badge-stat-value" style="color:' + data.color + ';">' + data.stats.skills + '</div><div class="staff-badge-stat-label">技能</div></div><div class="staff-badge-stat"><div class="staff-badge-stat-value">' + data.stats.tasks + '</div><div class="staff-badge-stat-label">今日任务</div></div><div class="staff-badge-stat"><div class="staff-badge-stat-value">' + data.stats.rate + '</div><div class="staff-badge-stat-label">完成率</div></div></div>';
  
  // 按钮放在stats下面
  badgeHtml += '<div style="margin-top:14px;">' + actionBtn + '</div>';
  badgeHtml += '</div></div></div>';
  
  html += badgeHtml;

  // TOC
  html += '<div class="staff-toc"><a class="staff-toc-item active" href="#task">🎯 当前任务</a><a class="staff-toc-item" href="#skills">🛠️ 拥有的技能</a><a class="staff-toc-item" href="#queue">📋 等待队列</a><span class="staff-toc-divider"></span><a class="staff-toc-item" href="#output">📦 今日成果</a><a class="staff-toc-item" href="#collab">🤝 协作员工</a><a class="staff-toc-item" href="#stats">📊 任务数据</a><span class="staff-toc-divider"></span><a class="staff-toc-item" href="#evolution">🚀 升级迭代</a></div>';

  // Current Task
  html += '<div class="staff-current-task" id="task"><div class="section-title">🎯 当前任务</div><div class="current-task-main"><div class="current-task-icon" style="background: linear-gradient(135deg, ' + data.color + ', ' + data.color + 'aa);">' + (data.collabs && data.collabs[0] ? data.collabs[0].icon : '🤖') + '</div><div class="current-task-info"><div class="current-task-name">' + data.currentTask.name + '</div><div class="current-task-meta">来自：' + data.currentTask.from + ' · ' + data.currentTask.time + '</div></div><div class="current-task-progress"><div class="progress-bar"><div class="progress-fill" style="width:' + data.currentTask.progress + '%"></div></div><div class="progress-text">' + data.currentTask.progress + '%</div></div></div></div>';

  // Skills
  html += '<div class="staff-queue" id="skills"><div class="section-title">🛠️ 拥有的技能 <span>(' + data.skills.length + ')</span></div><div class="queue-grid">';
  for (var i = 0; i < data.skills.length; i++) { html += '<div class="queue-item"><div class="queue-item-name" style="color:' + data.color + ';">' + data.skills[i] + '</div></div>'; }
  html += '</div></div>';

  // Queue
  html += '<div class="staff-queue" id="queue"><div class="section-title">📋 等待队列 <span>(' + data.queue.length + ')</span></div><div class="queue-grid">';
  for (var i = 0; i < data.queue.length; i++) { html += '<div class="queue-item"><div class="queue-item-name">' + data.queue[i] + '</div><div class="queue-item-time">等待中</div></div>'; }
  html += '</div></div>';

  // Outputs
  html += '<div class="staff-output" id="output"><div class="section-title">📦 今日成果</div><div class="output-grid">';
  for (var i = 0; i < data.outputs.length; i++) { var o = data.outputs[i]; html += '<div class="output-item"><div class="output-icon">📄</div><div class="output-info"><div class="output-name">' + o.name + '</div><div class="output-meta">' + o.time + ' · ' + o.size + '</div></div><span class="output-status ' + o.status + '">' + (o.status === 'done' ? '已完成' : '生成中') + '</span></div>'; }
  html += '</div></div>';

  // Collabs
  html += '<div class="staff-collab" id="collab"><div class="section-title">🤝 协作员工</div><div class="collab-grid">';
  if (data.collabs) { for (var i = 0; i < data.collabs.length; i++) { var c = data.collabs[i]; html += '<div class="collab-item"><div class="collab-avatar" style="background:linear-gradient(135deg,' + c.color + ',' + c.color + 'aaa)">' + c.icon + '</div><div class="collab-info"><div class="collab-name">' + c.name + '</div><div class="collab-role">' + c.role + '</div><div class="collab-metrics"><span class="collab-metric">合作 ' + c.collab + ' 次</span><span class="collab-metric">完成 ' + c.done + ' 项</span></div></div></div>'; } }
  html += '</div></div>';

  // Stats
  html += '<div class="staff-task-data" id="stats"><div class="section-title">📊 任务数据（今日）</div><div class="task-data-grid"><div class="task-data-card"><div class="task-data-value green">' + data.stats.tasks + '</div><div class="task-data-label">任务总数</div></div><div class="task-data-card"><div class="task-data-value" style="color:' + data.color + '">' + data.stats.rate + '</div><div class="task-data-label">完成率</div></div><div class="task-data-card"><div class="task-data-value blue">' + data.tech.firstToken + '</div><div class="task-data-label">首字响应</div></div><div class="task-data-card"><div class="task-data-value orange">' + data.tech.context + '</div><div class="task-data-label">上下文</div></div></div></div>';

  // Evolution
  html += '<div class="staff-evolution" id="evolution"><div class="section-title">🚀 升级迭代记录</div><div class="evolution-timeline">';
  for (var i = 0; i < data.evolution.length; i++) { var e = data.evolution[i]; html += '<div class="evolution-item"><div class="evolution-dot ' + (i === 0 ? 'current' : '') + '"></div><div class="evolution-version">' + e.ver + ' <span class="evolution-tag ' + e.type + '">' + (e.type === 'major' ? '重大更新' : e.type === 'fix' ? 'Bug修复' : '功能更新') + '</span></div><div class="evolution-date">' + e.date + '</div><div class="evolution-desc">' + e.desc + '</div></div>'; }
  html += '</div></div></div></div>';

  document.getElementById('profileContent').innerHTML = html;
}

document.addEventListener('DOMContentLoaded', function() {
  renderProfile(getStaffId());
});
